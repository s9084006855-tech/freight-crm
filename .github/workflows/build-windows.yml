name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      windows_only:
        description: 'Build Windows only'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-mac:
    if: ${{ !inputs.windows_only }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Ensure resources exist
        run: |
          mkdir -p src-tauri/resources
          [ -f src-tauri/resources/vision_ocr ] || touch src-tauri/resources/vision_ocr

      - name: Build Mac app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Freight CRM ${{ github.ref_name }}'
          releaseBody: 'Auto-update release'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Ensure resources exist
        run: |
          mkdir -p src-tauri/resources
          if not exist src-tauri\resources\vision_ocr (echo. > src-tauri\resources\vision_ocr)
        shell: cmd

      - name: Build Windows app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Freight CRM ${{ github.ref_name }}'
          releaseBody: 'Auto-update release'
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
          includeUpdaterJson: true
