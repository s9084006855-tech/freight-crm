name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create or get release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Try to create; if it already exists, just fetch its ID
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            ID=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json id -q '.id')
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Freight CRM $TAG" \
              --notes "Auto-update release"
            ID=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json id -q '.id')
          fi
          echo "release_id=$ID" >> "$GITHUB_OUTPUT"

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - run: npm ci --legacy-peer-deps

      - name: Ensure resources exist
        run: |
          mkdir -p src-tauri/resources
          [ -f src-tauri/resources/vision_ocr ] || touch src-tauri/resources/vision_ocr

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - run: npm ci --legacy-peer-deps

      - name: Ensure resources exist
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/resources" | Out-Null
          if (-not (Test-Path "src-tauri/resources/vision_ocr")) {
            New-Item -ItemType File -Path "src-tauri/resources/vision_ocr" | Out-Null
          }

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target x86_64-pc-windows-msvc
          includeUpdaterJson: true
